version: '3.8'

services:
  campmanager:
    build: .
    container_name: campmanager-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database
      - DB_HOST=your-rds-endpoint.region.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=your_database_name
      - DB_USER=your_db_username
      - DB_PASSWORD=your_db_password
      # JWT
      - JWT_SECRET=your_jwt_secret_key_at_least_32_characters_long
      - JWT_EXPIRE=7d
      - JWT_REFRESH_EXPIRE=30d
      # AWS S3
      - AWS_REGION=ap-northeast-2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=your-s3-bucket-name
      # Frontend URL
      - FRONTEND_URL=https://your-domain.com
      # Upload
      - MAX_FILE_SIZE=10485760
      - ALLOWED_FILE_TYPES=image/jpeg,image/png,image/jpg,image/gif,image/webp
      # OpenAI (리뷰 텍스트 추출 - GPT-4o Vision)
      # 실제 값은 EC2 서버의 .env 파일에서 제어 (서버마다 설정 다름)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_VISION_DETAIL=${OPENAI_VISION_DETAIL:-high}
      # EXTRACTION_ENABLED=true 여도 EXTRACTION_ALLOWED_BRAND_IDS가 없으면 OFF (안전)
      #   미설정/빈값 → 전체 차단
      #   all         → 전체 허용
      #   1,5,10      → 해당 브랜드만
      - EXTRACTION_ENABLED=${EXTRACTION_ENABLED:-false}
      - EXTRACTION_ALLOWED_BRAND_IDS=${EXTRACTION_ALLOWED_BRAND_IDS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
