version: '3.8'

services:
  campmanager:
    build: .
    container_name: campmanager-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database
      - DB_HOST=serverdb.c96wgym80zj9.ap-northeast-2.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=serverdb
      - DB_USER=kwad
      - DB_PASSWORD=rkddntkfkd94!
      # JWT
      - JWT_SECRET=campmanager_super_secret_jwt_key_2024_change_in_production_32chars_min
      - JWT_EXPIRE=7d
      - JWT_REFRESH_EXPIRE=30d
      # AWS S3
      - AWS_REGION=ap-northeast-2
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=kwad-image
      # Frontend URL
      - FRONTEND_URL=https://kwad.co.kr
      # Upload
      - MAX_FILE_SIZE=10485760
      - ALLOWED_FILE_TYPES=image/jpeg,image/png,image/jpg,image/gif,image/webp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
